<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智享书途 - 新手任务</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 全局样式 -->
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body class="bg-[#F3F4F6] min-h-screen">
    <!-- 顶部导航栏 -->
    <header class="fixed top-0 left-0 right-0 h-[60px] bg-white shadow-sm z-10 flex items-center justify-between px-[16px]">
        <div class="flex items-center gap-[8px]">
            <button class="back-btn" onclick="window.location.href='task-center.html'">
                <i class="fa fa-arrow-left text-[20px]"></i>
            </button>
            <h1 class="text-[18px] font-medium">新手任务</h1>
        </div>
        <button class="text-[#4B5563]">
            <i class="fa fa-question-circle text-[20px]"></i>
        </button>
    </header>

    <!-- 主内容区 -->
    <main class="pt-[60px] pb-[60px] container mx-auto px-[16px]">
        <!-- 任务说明 -->
        <div class="card mt-[16px]">
            <div class="flex items-start gap-[12px]">
                <i class="fa fa-info-circle text-[#3B82F6] mt-[2px]"></i>
                <div class="flex-1">
                    <h2 class="text-[14px] font-medium mb-[4px]">新手专属任务</h2>
                    <p class="text-[12px] text-[#6B7280]">完成以下任务，快速熟悉平台功能，赚取新手专属积分奖励！</p>
                </div>
            </div>
        </div>
        
        <!-- 任务列表 -->
        <div class="mt-[24px]">
            <h2 class="text-[18px] font-medium mb-[12px]">任务列表</h2>
            <div class="space-y-[12px]">
                <!-- 任务项1：完成校园认证 -->
                <div class="card">
                    <div class="flex items-center gap-[12px]">
                        <div class="w-[50px] h-[50px] bg-[#EFF6FF] rounded-[8px] flex items-center justify-center">
                            <i class="fa fa-id-card text-[#2563EB]"></i>
                        </div>
                        <div class="flex-1">
                            <h3 class="text-[16px] font-medium mb-[4px]">完成校园认证</h3>
                            <p class="text-[12px] text-[#9CA3AF] mb-[8px]">认证后可享受全部功能</p>
                            <div class="w-full bg-[#F3F4F6] rounded-full h-[4px]">
                                <div class="bg-[#10B981] h-[4px] rounded-full" style="width: 0%"></div>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-[12px] text-[#10B981] mb-[4px]">
                                <i class="fa fa-coins mr-[4px]"></i>500积分
                            </div>
                            <button class="task-btn px-[12px] py-[4px] bg-[#2563EB] text-white text-[12px] rounded-full" data-task="verify" data-points="500">
                                去完成
                            </button>
                        </div>
                    </div>
                </div>
                
                <!-- 任务项2：上传学习资料 -->
                <div class="card">
                    <div class="flex items-center gap-[12px]">
                        <div class="w-[50px] h-[50px] bg-[#D1FAE5] rounded-[8px] flex items-center justify-center">
                            <i class="fa fa-book text-[#10B981]"></i>
                        </div>
                        <div class="flex-1">
                            <h3 class="text-[16px] font-medium mb-[4px]">上传学习资料</h3>
                            <p class="text-[12px] text-[#9CA3AF] mb-[8px]">上传一份学习资料并审核通过</p>
                            <div class="w-full bg-[#F3F4F6] rounded-full h-[4px]">
                                <div class="bg-[#10B981] h-[4px] rounded-full" style="width: 0%"></div>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-[12px] text-[#10B981] mb-[4px]">
                                <i class="fa fa-coins mr-[4px]"></i>200积分
                            </div>
                            <button class="task-btn px-[12px] py-[4px] bg-[#2563EB] text-white text-[12px] rounded-full" data-task="upload" data-points="200">
                                去完成
                            </button>
                        </div>
                    </div>
                </div>
                
                <!-- 任务项3：邀请好友 -->
                <div class="card">
                    <div class="flex items-center gap-[12px]">
                        <div class="w-[50px] h-[50px] bg-[#FEF3C7] rounded-[8px] flex items-center justify-center">
                            <i class="fa fa-share-alt text-[#F59E0B]"></i>
                        </div>
                        <div class="flex-1">
                            <h3 class="text-[16px] font-medium mb-[4px]">邀请好友</h3>
                            <p class="text-[12px] text-[#9CA3AF] mb-[8px]">邀请好友注册并完成认证</p>
                            <div class="w-full bg-[#F3F4F6] rounded-full h-[4px]">
                                <div class="bg-[#10B981] h-[4px] rounded-full" style="width: 0%"></div>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-[12px] text-[#10B981] mb-[4px]">
                                <i class="fa fa-coins mr-[4px]"></i>300积分
                            </div>
                            <button class="task-btn px-[12px] py-[4px] bg-[#2563EB] text-white text-[12px] rounded-full" data-task="invite" data-points="300">
                                去邀请
                            </button>
                        </div>
                    </div>
                </div>
                
                <!-- 任务项4：完善个人资料 -->
                <div class="card">
                    <div class="flex items-center gap-[12px]">
                        <div class="w-[50px] h-[50px] bg-[#FEE2E2] rounded-[8px] flex items-center justify-center">
                            <i class="fa fa-user-edit text-[#EF4444]"></i>
                        </div>
                        <div class="flex-1">
                            <h3 class="text-[16px] font-medium mb-[4px]">完善个人资料</h3>
                            <p class="text-[12px] text-[#9CA3AF] mb-[8px]">填写完整的个人资料和兴趣标签</p>
                            <div class="w-full bg-[#F3F4F6] rounded-full h-[4px]">
                                <div class="bg-[#10B981] h-[4px] rounded-full" style="width: 0%"></div>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-[12px] text-[#10B981] mb-[4px]">
                                <i class="fa fa-coins mr-[4px]"></i>100积分
                            </div>
                            <button class="task-btn px-[12px] py-[4px] bg-[#2563EB] text-white text-[12px] rounded-full" data-task="profile" data-points="100">
                                去完善
                            </button>
                        </div>
                    </div>
                </div>
                
                <!-- 任务项5：浏览学习资料 -->
                <div class="card">
                    <div class="flex items-center gap-[12px]">
                        <div class="w-[50px] h-[50px] bg-[#F3E8FF] rounded-[8px] flex items-center justify-center">
                            <i class="fa fa-search text-[#8B5CF6]"></i>
                        </div>
                        <div class="flex-1">
                            <h3 class="text-[16px] font-medium mb-[4px]">浏览学习资料</h3>
                            <p class="text-[12px] text-[#9CA3AF] mb-[8px]">浏览5份不同类别的学习资料</p>
                            <div class="w-full bg-[#F3F4F6] rounded-full h-[4px]">
                                <div class="bg-[#10B981] h-[4px] rounded-full" style="width: 0%"></div>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-[12px] text-[#10B981] mb-[4px]">
                                <i class="fa fa-coins mr-[4px]"></i>50积分
                            </div>
                            <button class="task-btn px-[12px] py-[4px] bg-[#2563EB] text-white text-[12px] rounded-full" data-task="browse" data-points="50">
                                去浏览
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 底部Tab栏 -->
    <footer>
        <div class="tabbar">
            <!-- 首页 -->
            <div class="tabbar-item inactive" data-page="home">
                <i class="fa fa-home text-[20px]"></i>
                <span class="text-[12px] mt-[2px]">首页</span>
            </div>
            
            <!-- 找资料 -->
            <div class="tabbar-item inactive" data-page="search">
                <i class="fa fa-search text-[20px]"></i>
                <span class="text-[12px] mt-[2px]">找资料</span>
            </div>
            
            <!-- 互助 -->
            <div class="tabbar-item inactive" data-page="exchange">
                <i class="fa fa-exchange-alt text-[20px]"></i>
                <span class="text-[12px] mt-[2px]">互助</span>
            </div>
            
            <!-- 备考 -->
            <div class="tabbar-item inactive" data-page="exam">
                <i class="fa fa-pen-fancy text-[20px]"></i>
                <span class="text-[12px] mt-[2px]">备考</span>
            </div>
            
            <!-- 我的 -->
            <div class="tabbar-item active" data-page="profile">
                <i class="fa fa-user text-[20px]"></i>
                <span class="text-[12px] mt-[2px]">我的</span>
            </div>
        </div>
    </footer>

    <!-- 页面特定JavaScript -->
    <script>
        // 文档加载完成后执行
        document.addEventListener('DOMContentLoaded', function() {
            // 获取任务按钮
            const taskButtons = document.querySelectorAll('.task-btn');
            
            // 为每个任务按钮添加点击事件
            taskButtons.forEach(button => {
                button.addEventListener('click', function() {
                    const taskType = this.dataset.task;
                    const points = parseInt(this.dataset.points);
                    
                    // 模拟任务完成（实际应用中应与后端API对接）
                    alert(`任务：${taskType}\n积分：${points}\n\n已完成！积分将自动发放到您的账户。`);
                    
                    // 更新任务状态（模拟完成）
                    const card = this.closest('.card');
                    const progressBar = card.querySelector('.bg-[#10B981]');
                    const buttonElement = this;
                    
                    // 更新进度条
                    progressBar.style.width = '100%';
                    
                    // 更新按钮状态
                    buttonElement.textContent = '已完成';
                    buttonElement.className = 'task-btn px-[12px] py-[4px] bg-[#10B981] text-white text-[12px] rounded-full';
                    buttonElement.disabled = true;
                    
                    // 控制台输出（用于后续对接后端）
                    console.log(`完成任务：${taskType}，获得积分：${points}`);
                });
            });
        });
    </script>
</body>
</html>
