<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智享书途 - 成就任务</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 全局样式 -->
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body class="bg-[#F3F4F6] min-h-screen">
    <!-- 顶部导航栏 -->
    <header class="fixed top-0 left-0 right-0 h-[60px] bg-white shadow-sm z-10 flex items-center justify-between px-[16px]">
        <div class="flex items-center gap-[8px]">
            <button class="back-btn" onclick="window.location.href='task-center.html'">
                <i class="fa fa-arrow-left text-[20px]"></i>
            </button>
            <h1 class="text-[18px] font-medium">成就任务</h1>
        </div>
        <button class="text-[#4B5563]">
            <i class="fa fa-trophy text-[20px]"></i>
        </button>
    </header>

    <!-- 主内容区 -->
    <main class="pt-[60px] pb-[60px] container mx-auto px-[16px]">
        <!-- 成就统计 -->
        <div class="card mt-[16px]">
            <div class="flex items-center justify-between">
                <div class="text-center">
                    <h2 class="text-[16px] font-medium">已解锁成就</h2>
                    <p class="text-[24px] font-bold text-[#2563EB]" id="unlocked-achievements">0</p>
                </div>
                <div class="w-[1px] h-[40px] bg-[#E5E7EB]"></div>
                <div class="text-center">
                    <h2 class="text-[16px] font-medium">总成就数</h2>
                    <p class="text-[24px] font-bold text-[#6B7280]">5</p>
                </div>
            </div>
        </div>
        
        <!-- 成就说明 -->
        <div class="card mt-[16px]">
            <div class="flex items-start gap-[12px]">
                <i class="fa fa-info-circle text-[#3B82F6] mt-[2px]"></i>
                <div class="flex-1">
                    <h2 class="text-[14px] font-medium mb-[4px]">成就系统说明</h2>
                    <p class="text-[12px] text-[#6B7280]">完成长期目标，解锁专属成就，获得大额积分奖励和独特勋章标识。</p>
                </div>
            </div>
        </div>
        
        <!-- 成就列表 -->
        <div class="mt-[24px]">
            <h2 class="text-[18px] font-medium mb-[12px]">成就清单</h2>
            <div class="space-y-[12px]">
                <!-- 成就项1：资料达人 -->
                <div class="card">
                    <div class="flex items-center gap-[12px]">
                        <div class="w-[50px] h-[50px] bg-[#EFF6FF] rounded-[8px] flex items-center justify-center">
                            <i class="fa fa-book text-[#2563EB] achievement-icon" data-achievement="uploader"></i>
                        </div>
                        <div class="flex-1">
                            <h3 class="text-[16px] font-medium mb-[4px]">资料达人</h3>
                            <p class="text-[12px] text-[#9CA3AF] mb-[8px]">上传10份优质学习资料</p>
                            <div class="flex items-center justify-between">
                                <div class="w-[70%] bg-[#F3F4F6] rounded-full h-[4px]">
                                    <div class="bg-[#10B981] h-[4px] rounded-full achievement-progress" data-achievement="uploader" style="width: 0%"></div>
                                </div>
                                <span class="text-[12px] text-[#6B7280] achievement-counter" data-achievement="uploader">0/10</span>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-[12px] text-[#10B981] mb-[4px]">
                                <i class="fa fa-coins mr-[4px]"></i>1000积分
                            </div>
                            <div class="text-[12px] text-[#9CA3AF] achievement-status" data-achievement="uploader">进行中</div>
                        </div>
                    </div>
                </div>
                
                <!-- 成就项2：社交达人 -->
                <div class="card">
                    <div class="flex items-center gap-[12px]">
                        <div class="w-[50px] h-[50px] bg-[#D1FAE5] rounded-[8px] flex items-center justify-center">
                            <i class="fa fa-users text-[#10B981] achievement-icon" data-achievement="social"></i>
                        </div>
                        <div class="flex-1">
                            <h3 class="text-[16px] font-medium mb-[4px]">社交达人</h3>
                            <p class="text-[12px] text-[#9CA3AF] mb-[8px]">累计邀请5位好友</p>
                            <div class="flex items-center justify-between">
                                <div class="w-[70%] bg-[#F3F4F6] rounded-full h-[4px]">
                                    <div class="bg-[#10B981] h-[4px] rounded-full achievement-progress" data-achievement="social" style="width: 0%"></div>
                                </div>
                                <span class="text-[12px] text-[#6B7280] achievement-counter" data-achievement="social">0/5</span>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-[12px] text-[#10B981] mb-[4px]">
                                <i class="fa fa-coins mr-[4px]"></i>800积分
                            </div>
                            <div class="text-[12px] text-[#9CA3AF] achievement-status" data-achievement="social">进行中</div>
                        </div>
                    </div>
                </div>
                
                <!-- 成就项3：坚持不懈 -->
                <div class="card">
                    <div class="flex items-center gap-[12px]">
                        <div class="w-[50px] h-[50px] bg-[#FEF3C7] rounded-[8px] flex items-center justify-center">
                            <i class="fa fa-calendar-alt text-[#F59E0B] achievement-icon" data-achievement="streak"></i>
                        </div>
                        <div class="flex-1">
                            <h3 class="text-[16px] font-medium mb-[4px]">坚持不懈</h3>
                            <p class="text-[12px] text-[#9CA3AF] mb-[8px]">连续签到30天</p>
                            <div class="flex items-center justify-between">
                                <div class="w-[70%] bg-[#F3F4F6] rounded-full h-[4px]">
                                    <div class="bg-[#10B981] h-[4px] rounded-full achievement-progress" data-achievement="streak" style="width: 0%"></div>
                                </div>
                                <span class="text-[12px] text-[#6B7280] achievement-counter" data-achievement="streak">0/30</span>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-[12px] text-[#10B981] mb-[4px]">
                                <i class="fa fa-coins mr-[4px]"></i>1500积分
                            </div>
                            <div class="text-[12px] text-[#9CA3AF] achievement-status" data-achievement="streak">进行中</div>
                        </div>
                    </div>
                </div>
                
                <!-- 成就项4：评论达人 -->
                <div class="card">
                    <div class="flex items-center gap-[12px]">
                        <div class="w-[50px] h-[50px] bg-[#FEE2E2] rounded-[8px] flex items-center justify-center">
                            <i class="fa fa-comment-dots text-[#EF4444] achievement-icon" data-achievement="commenter"></i>
                        </div>
                        <div class="flex-1">
                            <h3 class="text-[16px] font-medium mb-[4px]">评论达人</h3>
                            <p class="text-[12px] text-[#9CA3AF] mb-[8px]">对20份资料发表评论</p>
                            <div class="flex items-center justify-between">
                                <div class="w-[70%] bg-[#F3F4F6] rounded-full h-[4px]">
                                    <div class="bg-[#10B981] h-[4px] rounded-full achievement-progress" data-achievement="commenter" style="width: 0%"></div>
                                </div>
                                <span class="text-[12px] text-[#6B7280] achievement-counter" data-achievement="commenter">0/20</span>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-[12px] text-[#10B981] mb-[4px]">
                                <i class="fa fa-coins mr-[4px]"></i>600积分
                            </div>
                            <div class="text-[12px] text-[#9CA3AF] achievement-status" data-achievement="commenter">进行中</div>
                        </div>
                    </div>
                </div>
                
                <!-- 成就项5：分享达人 -->
                <div class="card">
                    <div class="flex items-center gap-[12px]">
                        <div class="w-[50px] h-[50px] bg-[#F3E8FF] rounded-[8px] flex items-center justify-center">
                            <i class="fa fa-share-nodes text-[#8B5CF6] achievement-icon" data-achievement="sharer"></i>
                        </div>
                        <div class="flex-1">
                            <h3 class="text-[16px] font-medium mb-[4px]">分享达人</h3>
                            <p class="text-[12px] text-[#9CA3AF] mb-[8px]">分享10份学习资料</p>
                            <div class="flex items-center justify-between">
                                <div class="w-[70%] bg-[#F3F4F6] rounded-full h-[4px]">
                                    <div class="bg-[#10B981] h-[4px] rounded-full achievement-progress" data-achievement="sharer" style="width: 0%"></div>
                                </div>
                                <span class="text-[12px] text-[#6B7280] achievement-counter" data-achievement="sharer">0/10</span>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-[12px] text-[#10B981] mb-[4px]">
                                <i class="fa fa-coins mr-[4px]"></i>500积分
                            </div>
                            <div class="text-[12px] text-[#9CA3AF] achievement-status" data-achievement="sharer">进行中</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 已解锁勋章 -->
        <div class="mt-[24px]">
            <h2 class="text-[18px] font-medium mb-[12px]">我的勋章</h2>
            <div class="card p-[16px]">
                <div class="flex flex-wrap gap-[16px]" id="badge-container">
                    <div class="text-center">
                        <div class="w-[60px] h-[60px] bg-[#F3F4F6] rounded-full flex items-center justify-center mb-[4px]">
                            <i class="fa fa-trophy text-[#D1D5DB]"></i>
                        </div>
                        <p class="text-[12px] text-[#9CA3AF]">暂无勋章</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 底部Tab栏 -->
    <footer>
        <div class="tabbar">
            <!-- 首页 -->
            <div class="tabbar-item inactive" data-page="home">
                <i class="fa fa-home text-[20px]"></i>
                <span class="text-[12px] mt-[2px]">首页</span>
            </div>
            
            <!-- 找资料 -->
            <div class="tabbar-item inactive" data-page="search">
                <i class="fa fa-search text-[20px]"></i>
                <span class="text-[12px] mt-[2px]">找资料</span>
            </div>
            
            <!-- 互助 -->
            <div class="tabbar-item inactive" data-page="exchange">
                <i class="fa fa-exchange-alt text-[20px]"></i>
                <span class="text-[12px] mt-[2px]">互助</span>
            </div>
            
            <!-- 备考 -->
            <div class="tabbar-item inactive" data-page="exam">
                <i class="fa fa-pen-fancy text-[20px]"></i>
                <span class="text-[12px] mt-[2px]">备考</span>
            </div>
            
            <!-- 我的 -->
            <div class="tabbar-item active" data-page="profile">
                <i class="fa fa-user text-[20px]"></i>
                <span class="text-[12px] mt-[2px]">我的</span>
            </div>
        </div>
    </footer>

    <!-- 页面特定JavaScript -->
    <script>
        // 文档加载完成后执行
        document.addEventListener('DOMContentLoaded', function() {
            // 成就数据配置
            const achievements = {
                uploader: {
                    name: "资料达人",
                    description: "上传10份优质学习资料",
                    target: 10,
                    current: 0,
                    points: 1000,
                    icon: "fa-book",
                    color: "#2563EB",
                    unlocked: false
                },
                social: {
                    name: "社交达人",
                    description: "累计邀请5位好友",
                    target: 5,
                    current: 0,
                    points: 800,
                    icon: "fa-users",
                    color: "#10B981",
                    unlocked: false
                },
                streak: {
                    name: "坚持不懈",
                    description: "连续签到30天",
                    target: 30,
                    current: 0,
                    points: 1500,
                    icon: "fa-calendar-alt",
                    color: "#F59E0B",
                    unlocked: false
                },
                commenter: {
                    name: "评论达人",
                    description: "对20份资料发表评论",
                    target: 20,
                    current: 0,
                    points: 600,
                    icon: "fa-comment-dots",
                    color: "#EF4444",
                    unlocked: false
                },
                sharer: {
                    name: "分享达人",
                    description: "分享10份学习资料",
                    target: 10,
                    current: 0,
                    points: 500,
                    icon: "fa-share-nodes",
                    color: "#8B5CF6",
                    unlocked: false
                }
            };
            
            // 从localStorage加载成就数据
            const savedAchievements = JSON.parse(localStorage.getItem('achievements') || '{}');
            
            // 合并保存的数据到成就配置
            for (const [key, data] of Object.entries(savedAchievements)) {
                if (achievements[key]) {
                    achievements[key].current = data.current;
                    achievements[key].unlocked = data.unlocked;
                }
            }
            
            // 更新成就显示
            function updateAchievements() {
                let unlockedCount = 0;
                
                for (const [key, achievement] of Object.entries(achievements)) {
                    // 计算进度百分比
                    const progress = Math.min((achievement.current / achievement.target) * 100, 100);
                    
                    // 更新进度条
                    const progressBar = document.querySelector(`.achievement-progress[data-achievement="${key}"]`);
                    if (progressBar) {
                        progressBar.style.width = `${progress}%`;
                    }
                    
                    // 更新计数器
                    const counter = document.querySelector(`.achievement-counter[data-achievement="${key}"]`);
                    if (counter) {
                        counter.textContent = `${achievement.current}/${achievement.target}`;
                    }
                    
                    // 更新状态
                    const status = document.querySelector(`.achievement-status[data-achievement="${key}"]`);
                    if (status) {
                        if (achievement.unlocked) {
                            status.textContent = "已解锁";
                            status.className = "text-[12px] text-[#10B981] achievement-status";
                            unlockedCount++;
                        } else {
                            status.textContent = "进行中";
                            status.className = "text-[12px] text-[#9CA3AF] achievement-status";
                        }
                    }
                    
                    // 更新图标
                    const icon = document.querySelector(`.achievement-icon[data-achievement="${key}"]`);
                    if (icon) {
                        if (achievement.unlocked) {
                            icon.style.color = achievement.color;
                        } else {
                            icon.style.color = "#9CA3AF";
                        }
                    }
                }
                
                // 更新已解锁成就数量
                document.getElementById('unlocked-achievements').textContent = unlockedCount;
                
                // 更新勋章展示
                updateBadges();
            }
            
            // 更新勋章展示
            function updateBadges() {
                const badgeContainer = document.getElementById('badge-container');
                const unlockedAchievements = Object.values(achievements).filter(a => a.unlocked);
                
                if (unlockedAchievements.length === 0) {
                    // 没有解锁的成就
                    badgeContainer.innerHTML = `
                        <div class="text-center">
                            <div class="w-[60px] h-[60px] bg-[#F3F4F6] rounded-full flex items-center justify-center mb-[4px]">
                                <i class="fa fa-trophy text-[#D1D5DB]"></i>
                            </div>
                            <p class="text-[12px] text-[#9CA3AF]">暂无勋章</p>
                        </div>
                    `;
                } else {
                    // 展示已解锁的勋章
                    badgeContainer.innerHTML = unlockedAchievements.map(achievement => `
                        <div class="text-center">
                            <div class="w-[60px] h-[60px] bg-${achievement.color}33 rounded-full flex items-center justify-center mb-[4px]">
                                <i class="${achievement.icon} text-${achievement.color}"></i>
                            </div>
                            <p class="text-[12px] text-[#6B7280]">${achievement.name}</p>
                        </div>
                    `).join('');
                }
            }
            
            // 模拟成就进度更新（实际应用中应与后端API对接）
            function simulateAchievementProgress() {
                // 随机更新一些成就的进度
                const randomAchievements = Object.keys(achievements);
                const randomAchievement = randomAchievements[Math.floor(Math.random() * randomAchievements.length)];
                
                if (achievements[randomAchievement].current < achievements[randomAchievement].target) {
                    achievements[randomAchievement].current++;
                    
                    // 检查是否解锁成就
                    if (achievements[randomAchievement].current >= achievements[randomAchievement].target) {
                        achievements[randomAchievement].unlocked = true;
                        
                        // 显示解锁提示
                        alert(`🎉 恭喜解锁成就！\n${achievements[randomAchievement].name}\n获得积分：${achievements[randomAchievement].points}`);
                    }
                    
                    // 保存到localStorage
                    localStorage.setItem('achievements', JSON.stringify(achievements));
                    
                    // 更新显示
                    updateAchievements();
                }
            }
            
            // 初始化成就显示
            updateAchievements();
            
            // 添加成就进度更新按钮（用于演示）
            // 在实际应用中，这部分应该由用户的实际操作触发
            const simulateBtn = document.createElement('button');
            simulateBtn.textContent = '模拟进度更新';
            simulateBtn.className = 'fixed bottom-[80px] right-[16px] bg-[#3B82F6] text-white px-[16px] py-[8px] rounded-full text-[14px] shadow-lg';
            simulateBtn.addEventListener('click', simulateAchievementProgress);
            document.body.appendChild(simulateBtn);
        });
    </script>
</body>
</html>
