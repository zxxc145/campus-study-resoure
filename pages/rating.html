<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智享书途 - 给我们评分</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 全局样式 -->
    <link rel="stylesheet" href="../assets/css/styles.css">
    <style>
        /* 星级评分样式优化 */
        .star-rating {
            position: relative;
            display: inline-flex;
            gap: 8px;
        }
        
        .star-rating .fa-star {
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        /* 未选中星星样式 */
        .star-rating .fa-star.regular {
            color: #E5E7EB;
        }
        
        /* 选中星星样式 */
        .star-rating .fa-star.solid {
            color: #F59E0B;
        }
        
        /* 鼠标悬停效果 */
        .star-rating .fa-star:hover {
            transform: scale(1.1);
        }
        
        /* 提交按钮样式优化 */
        #submit-rating {
            transition: all 0.2s ease;
        }
        
        #submit-rating:active {
            transform: scale(0.98);
        }
        
        #submit-rating:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        /* 积分奖励区域动画 */
        .points-awarded {
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* 图片点击放大功能 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            max-width: 90%;
            max-height: 90%;
            border-radius: 8px;
        }
        
        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 30px;
            cursor: pointer;
        }
        
        /* 平台logo容器 */
        .platform-logo-container {
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }
        
        /* 积分图标容器 */
        .points-icon-container {
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }
        
        /* 响应式设计 */
        @media (max-width: 640px) {
            .platform-logo-container {
                width: 40px;
                height: 40px;
            }
            
            .points-icon-container {
                width: 50px;
                height: 50px;
            }
        }
    </style>
</head>
<body class="bg-[#F3F4F6] min-h-screen">
    <!-- 顶部导航栏 -->
    <header class="fixed top-0 left-0 right-0 h-[60px] bg-white shadow-sm z-10 flex items-center justify-between px-[16px]">
        <div class="flex items-center gap-[8px]">
            <button class="back-btn" onclick="window.location.href='settings.html'">
                <i class="fa fa-arrow-left text-[20px]"></i>
            </button>
            <div class="flex items-center gap-[8px]">
                <!-- 平台logo -->
                <div class="platform-logo-container w-[48px] h-[48px] rounded-full overflow-hidden">
                    <img src="https://picsum.photos/id/1005/96/96" alt="智享书途平台logo" class="w-full h-full object-cover" loading="lazy" onclick="openImageModal(this)">
                </div>
                <h1 class="text-[18px] font-medium">给我们评分</h1>
            </div>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="pt-[60px] pb-[60px] container mx-auto px-[16px]">
        <!-- 评分引导 -->
        <div class="bg-white p-[16px] mt-[16px] rounded-[8px] shadow-sm">
            <div class="text-center">
                <div class="w-[80px] h-[80px] bg-[#F59E0B] rounded-full flex items-center justify-center mx-auto mb-[16px]">
                    <i class="fa fa-star text-white text-[40px]"></i>
                </div>
                <h2 class="text-[20px] font-bold mb-[8px]">感谢您的支持！</h2>
                <p class="text-[14px] text-[#6B7280] mb-[16px]">请给我们评分，帮助我们做得更好</p>
                
                <!-- 星级评分 -->
                <div class="star-rating flex justify-center gap-[8px] mb-[16px]">
                    <i class="fa-regular fa-star text-[40px] regular cursor-pointer" data-rating="1"></i>
                    <i class="fa-regular fa-star text-[40px] regular cursor-pointer" data-rating="2"></i>
                    <i class="fa-regular fa-star text-[40px] regular cursor-pointer" data-rating="3"></i>
                    <i class="fa-regular fa-star text-[40px] regular cursor-pointer" data-rating="4"></i>
                    <i class="fa-regular fa-star text-[40px] regular cursor-pointer" data-rating="5"></i>
                </div>
                
                <!-- 评分文字 -->
                <div class="text-center mb-[16px]">
                    <p id="rating-text" class="text-[16px] font-medium text-[#6B7280]">请选择评分</p>
                </div>
                
                <!-- 评论输入 -->
                <div class="mb-[16px]">
                    <textarea id="rating-comment" class="w-full p-[8px] border border-[#E5E7EB] rounded-[4px] resize-none" rows="3" placeholder="请写下您的宝贵意见（选填）"></textarea>
                </div>
                
                <!-- 提交按钮 -->
                <button id="submit-rating" class="w-full py-[10px] bg-[#2563EB] text-white rounded-[4px] font-medium">
                    提交评分
                </button>
            </div>
        </div>
        
        <!-- 评分奖励 -->
        <div class="bg-white p-[16px] mt-[16px] rounded-[8px] shadow-sm">
            <h2 class="text-[18px] font-medium mb-[16px]">评分奖励</h2>
            <div class="flex items-center justify-center">
                <div class="text-center">
                    <div class="points-icon-container w-[60px] h-[60px] bg-[#2563EB] rounded-full flex items-center justify-center mx-auto mb-[8px]">
                        <img src="https://picsum.photos/id/1011/120/120" alt="积分奖励图标" class="w-full h-full object-cover" loading="lazy" onclick="openImageModal(this)">
                    </div>
                    <p class="text-[14px] mb-[4px]">评分奖励</p>
                    <p class="text-[24px] font-bold text-[#2563EB]">
                        50 积分
                        <span id="points-status" class="text-[12px] font-normal text-[#10B981] ml-[4px] hidden">已到账</span>
                    </p>
                    <p class="text-[12px] text-[#6B7280] mt-[4px]">评分后立即到账</p>
                </div>
            </div>
        </div>
        
        <!-- 评分说明 -->
        <div class="bg-white p-[16px] mt-[16px] rounded-[8px] shadow-sm">
            <h2 class="text-[18px] font-medium mb-[16px]">评分说明</h2>
            <ul class="space-y-[8px]">
                <li class="flex items-start gap-[8px]">
                    <i class="fa fa-check-circle text-[16px] text-[#10B981] mt-[2px]"></i>
                    <span class="text-[14px] text-[#4B5563]">每个用户只能评分一次</span>
                </li>
                <li class="flex items-start gap-[8px]">
                    <i class="fa fa-check-circle text-[16px] text-[#10B981] mt-[2px]"></i>
                    <span class="text-[14px] text-[#4B5563]">评分后可以获得50积分奖励</span>
                </li>
                <li class="flex items-start gap-[8px]">
                    <i class="fa fa-check-circle text-[16px] text-[#10B981] mt-[2px]"></i>
                    <span class="text-[14px] text-[#4B5563]">您的评分和意见将帮助我们改进服务</span>
                </li>
                <li class="flex items-start gap-[8px]">
                    <i class="fa fa-check-circle text-[16px] text-[#10B981] mt-[2px]"></i>
                    <span class="text-[14px] text-[#4B5563]">评分内容将匿名展示，保护您的隐私</span>
                </li>
            </ul>
        </div>
    </main>

    <!-- 图片放大模态框 -->
    <div id="image-modal" class="modal">
        <span class="close-btn">&times;</span>
        <img class="modal-content" id="modal-image">
    </div>

    <!-- 全局JavaScript -->
    <script src="../assets/js/app.js"></script>
    
    <!-- 页面特定JavaScript -->
    <script>
        // 当前评分
        let currentRating = 0;
        // 是否正在提交中
        let isSubmitting = false;
        
        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化图片放大功能
            initImageModal();
            
            // 检查是否已经评分
            const hasRated = localStorage.getItem('hasRated');
            if (hasRated) {
                showRatedMessage();
                return;
            }
            
            // 初始化星级评分交互
            initStarRating();
            // 初始化提交按钮事件
            initSubmitButton();
        });
        
        // 初始化星级评分交互
        function initStarRating() {
            const stars = document.querySelectorAll('.star-rating .fa-star');
            
            stars.forEach((star, index) => {
                // 点击事件：选中/取消评分
                star.addEventListener('click', function() {
                    const rating = index + 1;
                    
                    // 如果点击的是当前已选中的星星，则取消评分
                    if (currentRating === rating) {
                        currentRating = 0;
                        updateStars(0);
                        updateRatingText(0);
                    } else {
                        currentRating = rating;
                        updateStars(rating);
                        updateRatingText(rating);
                    }
                });
                
                // 鼠标悬停事件：预览评分
                star.addEventListener('mouseenter', function() {
                    const rating = index + 1;
                    updateStars(rating, true);
                });
                
                // 鼠标离开事件：恢复实际评分
                star.addEventListener('mouseleave', function() {
                    updateStars(currentRating);
                });
            });
        }
        
        // 更新星星样式
        function updateStars(rating, isPreview = false) {
            const stars = document.querySelectorAll('.star-rating .fa-star');
            
            stars.forEach((star, index) => {
                if (index < rating) {
                    // 选中的星星：实心黄色
                    star.classList.remove('fa-regular', 'regular');
                    star.classList.add('fa-solid', 'solid');
                    
                    // 如果是预览状态，添加透明度
                    if (isPreview) {
                        star.style.opacity = '0.7';
                    } else {
                        star.style.opacity = '1';
                    }
                } else {
                    // 未选中的星星：空心灰色
                    star.classList.remove('fa-solid', 'solid');
                    star.classList.add('fa-regular', 'regular');
                    star.style.opacity = '1';
                }
            });
        }
        
        // 更新评分文字
        function updateRatingText(rating) {
            const text = document.getElementById('rating-text');
            const ratingTexts = [
                '请选择评分', // 0分
                '不满意',     // 1分
                '一般',       // 2分
                '满意',       // 3分
                '非常满意',   // 4分
                '太棒了'      // 5分
            ];
            
            text.textContent = ratingTexts[rating];
            
            if (rating > 0) {
                text.classList.remove('text-[#6B7280]');
                text.classList.add('text-[#F59E0B]');
            } else {
                text.classList.remove('text-[#F59E0B]');
                text.classList.add('text-[#6B7280]');
            }
        }
        
        // 初始化提交按钮事件
        function initSubmitButton() {
            const submitBtn = document.getElementById('submit-rating');
            
            submitBtn.addEventListener('click', function() {
                // 防止重复提交
                if (isSubmitting) return;
                
                submitRating();
            });
        }
        
        // 提交评分
        function submitRating() {
            // 1. 检查是否选择了评分
            if (currentRating === 0) {
                alert('请先选择评分星级');
                return;
            }
            
            // 2. 显示确认弹窗
            const confirmSubmit = confirm('确定提交评分并领取50积分吗？');
            if (!confirmSubmit) {
                return;
            }
            
            // 3. 开始提交
            isSubmitting = true;
            const submitBtn = document.getElementById('submit-rating');
            submitBtn.textContent = '提交中...';
            submitBtn.disabled = true;
            
            // 4. 模拟API请求（2秒后完成）
            setTimeout(function() {
                // 保存评分记录到localStorage
                const comment = document.getElementById('rating-comment').value;
                const ratingData = {
                    rating: currentRating,
                    comment: comment,
                    timestamp: new Date().toISOString()
                };
                localStorage.setItem('ratingData', JSON.stringify(ratingData));
                localStorage.setItem('hasRated', 'true');
                
                // 更新积分（模拟）
                let points = parseInt(localStorage.getItem('userPoints') || '0');
                points += 50;
                localStorage.setItem('userPoints', points);
                
                // 5. 显示成功消息
                alert('评分提交成功，已为您到账50积分');
                
                // 6. 更新积分奖励区域
                const pointsStatus = document.getElementById('points-status');
                pointsStatus.classList.remove('hidden');
                pointsStatus.classList.add('points-awarded');
                
                // 7. 显示已评分状态
                showRatedMessage();
                
                // 8. 重置提交状态
                isSubmitting = false;
            }, 2000);
        }
        
        // 显示已评分消息
        function showRatedMessage() {
            const ratingContainer = document.querySelector('.bg-white.p-[16px].mt-[16px]');
            
            // 替换评分表单为已评分消息
            ratingContainer.innerHTML = `
                <div class="text-center">
                    <div class="w-[80px] h-[80px] bg-[#10B981] rounded-full flex items-center justify-center mx-auto mb-[16px]">
                        <i class="fa fa-check-circle text-white text-[40px]"></i>
                    </div>
                    <h2 class="text-[20px] font-bold mb-[8px]">评分成功！</h2>
                    <p class="text-[14px] text-[#6B7280] mb-[16px]">感谢您的反馈，我们会继续努力改进服务</p>
                    <button class="w-full py-[10px] bg-[#E5E7EB] text-[#6B7280] rounded-[4px] font-medium" disabled>
                        已提交评分
                    </button>
                </div>
            `;
            
            // 更新积分奖励区域
            const pointsStatus = document.getElementById('points-status');
            pointsStatus.classList.remove('hidden');
            pointsStatus.classList.add('points-awarded');
        }
        
        // 初始化图片放大功能
        function initImageModal() {
            const modal = document.getElementById('image-modal');
            const modalImg = document.getElementById('modal-image');
            const closeBtn = document.querySelector('.close-btn');
            
            // 点击关闭按钮
            closeBtn.addEventListener('click', () => {
                modal.style.display = 'none';
            });
            
            // 点击模态框外部关闭
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.style.display = 'none';
                }
            });
        }
        
        // 打开图片放大模态框
        function openImageModal(img) {
            const modal = document.getElementById('image-modal');
            const modalImg = document.getElementById('modal-image');
            
            modal.style.display = 'flex';
            modalImg.src = img.src;
            modalImg.alt = img.alt;
        }
    </script>
</body>
</html>
