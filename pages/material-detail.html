<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>资料详情 - 智享书途</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 全局样式 -->
    <link rel="stylesheet" href="../assets/css/styles.css">
    <script src="../assets/js/app.js"></script>
    <style>
        /* 图片点击放大功能 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            max-width: 90%;
            max-height: 90%;
            border-radius: 8px;
        }
        
        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 30px;
            cursor: pointer;
        }
        
        /* 封面图容器 */
        .cover-image-container {
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }
        
        /* 推荐资料图片容器 */
        .recommended-image-container {
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }
        
        /* 响应式设计 */
        @media (max-width: 640px) {
            .cover-image-container {
                height: 150px;
            }
        }
    </style>
</head>
<body class="bg-[#F3F4F6] min-h-screen">
    <!-- 顶部导航栏 -->
    <header class="fixed top-0 left-0 right-0 h-[60px] bg-white shadow-sm z-10 flex items-center justify-between px-[16px]">
        <div class="flex items-center gap-[8px]">
            <button class="back-btn">
                <i class="fa fa-arrow-left text-[20px]"></i>
            </button>
            <h1 class="text-[18px] font-medium">资料详情</h1>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="pt-[60px] pb-[60px] container mx-auto px-[16px]">
        <!-- 资料卡片 -->
        <div class="bg-white p-[16px] rounded-[12px] shadow-sm mt-[16px]">
            <!-- 资料封面 -->
            <div class="cover-image-container w-full h-[180px] bg-[#F3F4F6] rounded-[8px] mb-[16px]">
                <img id="material-cover" src="" alt="资料封面" class="w-full h-full object-cover" loading="lazy" onclick="openImageModal(this)">
            </div>
            
            <!-- 资料标题和信息 -->
            <h2 id="material-title" class="text-[20px] font-bold mb-[8px]">资料标题</h2>
            <p id="material-info" class="text-[14px] text-[#9CA3AF] mb-[16px]">资料分类 | 发布时间</p>
            
            <!-- 评分和下载量 -->
            <div class="flex items-center gap-[24px] mb-[16px]">
                <div class="flex items-center gap-[4px]">
                    <i class="fa fa-star text-[#F97316]"></i>
                    <span id="material-score" class="text-[14px] text-[#4B5563]">0.0</span>
                </div>
                <div class="flex items-center gap-[4px]">
                    <i class="fa fa-download text-[#2563EB]"></i>
                    <span id="material-downloads" class="text-[14px] text-[#4B5563]">0次</span>
                </div>
            </div>
            
            <!-- 资料描述 -->
            <div class="mb-[16px]">
                <h3 class="text-[16px] font-medium mb-[8px]">资料简介</h3>
                <p id="material-description" class="text-[14px] text-[#4B5563] leading-[22px]">资料描述内容</p>
            </div>
            
            <!-- 资料详情 -->
            <div class="mb-[24px]">
                <h3 class="text-[16px] font-medium mb-[8px]">资料详情</h3>
                <div class="space-y-[8px]">
                    <div class="flex items-center justify-between">
                        <span class="text-[14px] text-[#9CA3AF]">文件大小</span>
                        <span id="material-size" class="text-[14px] text-[#4B5563]">0MB</span>
                    </div>
                    <div class="flex items-center justify-between">
                        <span class="text-[14px] text-[#9CA3AF]">浏览次数</span>
                        <span id="material-views" class="text-[14px] text-[#4B5563]">0次</span>
                    </div>
                    <div class="flex items-center justify-between">
                        <span class="text-[14px] text-[#9CA3AF]">发布者</span>
                        <span id="material-author" class="text-[14px] text-[#4B5563]">匿名用户</span>
                    </div>
                </div>
            </div>
            
            <!-- 兑换按钮 -->
            <div class="flex items-center gap-[12px]">
                <div class="flex-1">
                    <div class="text-[12px] text-[#9CA3AF] mb-[4px]">所需积分</div>
                    <div class="text-[24px] font-bold text-[#F97316]">
                        <i class="fa fa-coins text-[20px]"></i>
                        <span id="material-points">0</span>
                    </div>
                </div>
                <button class="exchange-btn flex-1 py-[12px] bg-[#2563EB] text-white font-medium rounded-[8px]">
                    立即兑换
                </button>
            </div>
        </div>
        
        <!-- 推荐资料 -->
        <div class="mt-[24px]">
            <div class="flex items-center justify-between mb-[16px]">
                <h2 class="text-[18px] font-medium">AI智能推荐</h2>
                <a href="search.html" class="text-[#2563EB] text-[14px]">查看更多</a>
            </div>
            <div class="space-y-[16px]">
                <!-- 推荐资料卡片将通过JavaScript动态生成 -->
            </div>
        </div>
        
        <!-- 备考套餐 -->
        <div class="mt-[24px]">
            <div class="flex items-center justify-between mb-[16px]">
                <h2 class="text-[18px] font-medium">备考套餐</h2>
                <a href="exam.html" class="text-[#2563EB] text-[14px]">查看更多</a>
            </div>
            <div class="grid grid-cols-2 gap-[16px]">
                <!-- 套餐卡片将通过JavaScript动态生成 -->
            </div>
        </div>
    </main>

    <!-- 图片放大模态框 -->
    <div id="image-modal" class="modal">
        <span class="close-btn">&times;</span>
        <img class="modal-content" id="modal-image">
    </div>

    <!-- 全局JavaScript -->
    <script src="../assets/js/app.js"></script>
    
    <!-- 页面特定JavaScript -->
    <script>

                    score: 4.9,

            // 获取当前资料数据
            const material = materialData[id];
            
            // 如果找不到资料，显示错误信息
            if (!material) {
                const container = document.querySelector('.bg-white.p-[16px].rounded-[12px].shadow-sm');
                container.innerHTML = `
                    <div class="text-center py-[40px]">
                        <i class="fa fa-exclamation-triangle text-[48px] text-[#F97316] mb-[16px]"></i>

                        </button>
                    </div>
                `;
                // 绑定返回搜索页按钮的点击事件
                container.querySelector('.back-to-search').addEventListener('click', function() {

                });

            document.getElementById('material-title').textContent = material.title;

            document.getElementById('material-downloads').textContent = `${material.downloads}次`;

            document.getElementById('material-author').textContent = material.author;
            document.getElementById('material-size').textContent = material.size;

            const materials = recommendedMaterials[category] || recommendedMaterials["历年真题"];
            // 直接选择推荐资料的容器
            const container = document.querySelector('.mt-[24px] .space-y-[16px]');
            
            if (container) {
                materials.forEach(material => {
                    const card = document.createElement('a');

                    container.appendChild(card);

        // 生成备考套餐

            const examPackages = {

            };
            
            const packages = examPackages[subject] || examPackages["英语学习"];

            if (container) {

        // 返回按钮点击事件 - 移到DOMContentLoaded内部确保元素已加载
        document.addEventListener('DOMContentLoaded', function() {
            const backBtn = document.querySelector('.back-btn');
            if (backBtn) {
                backBtn.addEventListener('click', function() {
                    window.history.back();
                });
            }
        });
        
        // 立即兑换按钮点击事件
        document.addEventListener('click', function(e) {
            if (e.target.closest('.exchange-btn')) {
                alert('兑换成功！资料已添加到您的下载列表。');
                // 实际应用中，这里应该跳转到兑换确认页面或执行兑换逻辑
                // 可以通过URL参数获取当前资料ID
                const params = new URLSearchParams(window.location.search);
                const id = params.get('id');
                // window.location.href = `exchange-confirm.html?id=${id}`;
            }
        });
        
        // 初始化图片放大功能
        function initImageModal() {
            const modal = document.getElementById('image-modal');
            const modalImg = document.getElementById('modal-image');
            const closeBtn = document.querySelector('.close-btn');
            
            // 点击关闭按钮
            closeBtn.addEventListener('click', () => {
                modal.style.display = 'none';
            });
            
            // 点击模态框外部关闭
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.style.display = 'none';
                }
            });
        }
        
        // 打开图片放大模态框
        function openImageModal(img) {
            const modal = document.getElementById('image-modal');
            const modalImg = document.getElementById('modal-image');
            
            modal.style.display = 'flex';
            modalImg.src = img.src;
            modalImg.alt = img.alt;
        }
    </script>
</body>
</html>
